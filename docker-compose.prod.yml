version: "3.9"

services:

  postgres:
    image: postgres:15-alpine
    container_name: stardash_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  etl:
    build: .
    container_name: stardash_etl
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST:     postgres
      POSTGRES_PORT:     5432
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./data:/app/data
    working_dir: /app
    command: python run_etl.py
    networks:
      - internal

  dashboard:
    build: .
    container_name: stardash_dashboard
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST:     postgres
      POSTGRES_PORT:     5432
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - internal
      - yanachat
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.stardash.rule=Host(`stardash.data-service.fr`)"
      - "traefik.http.routers.stardash.entrypoints=websecure"
      - "traefik.http.routers.stardash.tls.certresolver=letsencrypt"
      - "traefik.http.services.stardash.loadbalancer.server.port=8050"
      - "traefik.docker.network=yanachat"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8050')\""]
      interval: 15s
      timeout: 10s
      retries: 5

networks:
  internal:
    driver: bridge
  yanachat:
    external: true

volumes:
  postgres_data:
